<div class="login-container">
    <h1>Gallery</h1>
    <img id="gallery-image" src="ap.jpg" alt="Image Description">
    <button type="button" class="login-button" onclick="changeImage('back')">Back</button>
    <button type="button" class="login-button" onclick="changeImage('next')">Next</button>
</div>

<script>
    var images = [
        "ap.jpg",
        "ap1.jpg",
		"ap2.jpg"// Add paths to additional images
    ];
    var currentIndex = 0;
    
    function changeImage(direction) {
        var galleryImage = document.getElementById("gallery-image");
        
        if (direction === 'next') {
            currentIndex = (currentIndex + 1) % images.length;
        } else if (direction === 'back') {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
        }
        
        galleryImage.src = images[currentIndex];
    }
</script>
